name: Build paper PDF

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build_pdf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-latex-recommended texlive-latex-extra texlive-fonts-recommended

      - name: Install R dependencies
        run: |
          Rscript -e 'install.packages(c("rmarkdown", "tinytex", "knitr", "bookdown"), repos="https://cloud.r-project.org")'
          Rscript -e 'if (!requireNamespace("tinytex", quietly = TRUE)) install.packages("tinytex", repos="https://cloud.r-project.org"); tinytex::install_tinytex()'

      - name: Render paper to PDF
        working-directory: paper
        run: |
          Rscript -e 'rmarkdown::render("paper.md", output_format = "pdf_document")'

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: paper-pdf
          path: paper/paper.pdf
